name: Daily News Brief

on:
  schedule:
    # 09:45 UTC is 5:45 AM ET (Miami) - Aiming for early delivery
    - cron: '45 9 * * *'
    # 21:45 UTC is 5:45 PM ET (Miami)
    - cron: '45 21 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run script
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: "vmgrosso02@gmail.com"
          RECIPIENT_NAME: "Michael"
        run: python brief.py
